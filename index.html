<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #0d0f12;
      --surface:       #131720;
      --border:        #1e2535;
      --text:          #cdd6f4;
      --text-dim:      #6c7086;
      --green:         #a6e3a1;
      --blue:          #89b4fa;
      --yellow:        #f9e2af;
      --pink:          #f38ba8;
      --cyan:          #89dceb;
      --cursor-color:  #a6e3a1;
      --glow-color:    rgba(166,227,161,0.12);
      --font:          'JetBrains Mono', monospace;
      --font-size:     14px;
      --line-height:   1.75;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: var(--font-size);
      line-height: var(--line-height);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    #app {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 16px;
    }

    .terminal-window {
      width: 100%;
      max-width: 880px;
      height: 90vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 30px 80px rgba(0,0,0,0.6),
        0 0 60px var(--glow-color);
      overflow: hidden;
    }

    .title-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }
    .title-label {
      flex: 1; text-align: center;
      font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 8px;
      scroll-behavior: smooth;
    }
    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .line { margin-bottom: 2px; word-break: break-word; }
    .line-prompt { color: var(--green); }
    .line-output { color: var(--text); }
    .line-error  { color: var(--pink); }
    .line-blank  { height: 10px; display: block; }

    .input-row {
      display: flex;
      align-items: center;
      padding: 10px 24px 16px;
      border-top: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
    }
    .prompt-label { color: var(--green); white-space: nowrap; user-select: none; }
    #user-input {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text);
      font-family: var(--font); font-size: var(--font-size);
      caret-color: var(--cursor-color);
    }

    .cmd-output a { color: var(--blue); text-decoration: none; }
    .cmd-output a:hover { text-decoration: underline; }
    .cmd-output .label {
      color: var(--yellow);
      min-width: 120px;
      display: inline-block;
    }
    .cmd-output .accent { color: var(--cyan); }
    .cmd-output .muted  { color: var(--text-dim); }
    .cmd-output .green  { color: var(--green); }
    .cmd-output .pink   { color: var(--pink); }

    /* Experience card */
    .exp-card {
      border-left: 2px solid var(--green);
      padding: 8px 14px;
      margin: 8px 0;
      background: rgba(166,227,161,0.03);
      border-radius: 0 6px 6px 0;
    }
    .exp-card .exp-title   { color: var(--green); font-weight: 700; }
    .exp-card .exp-company { color: var(--cyan); }
    .exp-card .exp-date    { color: var(--text-dim); font-size: 12px; margin-bottom: 4px; }
    .exp-card .exp-bullets { color: var(--text); padding-left: 14px; }
    .exp-card .exp-bullets li { margin: 2px 0; font-size: 13px; }

    /* Skill badges */
    .badge {
      display: inline-block;
      background: rgba(137,180,250,0.1);
      border: 1px solid rgba(137,180,250,0.25);
      color: var(--blue);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      margin: 3px 3px 3px 0;
    }
    .badge.green-badge {
      background: rgba(166,227,161,0.08);
      border-color: rgba(166,227,161,0.2);
      color: var(--green);
    }

    /* Award card */
    .award {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .award:last-child { border-bottom: none; }
    .award .award-icon { font-size: 18px; }
    .award .award-name { color: var(--yellow); }
    .award .award-desc { color: var(--text-dim); font-size: 12px; }

    pre.ascii {
      color: var(--green);
      font-size: 10px;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    @media (max-width: 600px) {
      :root { --font-size: 12px; }
      .terminal-window { height: 95vh; border-radius: 6px; }
      #output { padding: 12px 14px 4px; }
      .input-row { padding: 8px 14px 12px; }
    }
  </style>
</head>

/* ── ENGINE ────────────────────────────────────────────── */
const outputEl = document.getElementById('output');
const inputEl  = document.getElementById('user-input');
const promptEl = document.getElementById('prompt-label');
promptEl.textContent = CONFIG.prompt;

let history = [];
let historyIndex = -1;

function clearOutput() { outputEl.innerHTML = ''; }
function scrollToBottom() { outputEl.scrollTop = outputEl.scrollHeight; }

function printInputLine(cmd) {
  const div = document.createElement('div');
  div.className = 'line line-prompt';
  div.textContent = CONFIG.prompt + ' ' + cmd;
  outputEl.appendChild(div);
}

async function printText(text, animate = false) {
  const div = document.createElement('div');
  div.className = 'line line-output';
  outputEl.appendChild(div);
  if (animate && CONFIG.typingEnabled && CONFIG.typeSpeed > 0) {
    for (const ch of text) {
      div.textContent += ch;
      scrollToBottom();
      await sleep(CONFIG.typeSpeed);
    }
  } else {
    div.textContent = text;
    scrollToBottom();
  }
}

function printHTML(html) {
  const div = document.createElement('div');
  div.className = 'line line-output';
  div.innerHTML = html;
  outputEl.appendChild(div);
  scrollToBottom();
}

function printBlank() {
  const s = document.createElement('span');
  s.className = 'line-blank';
  outputEl.appendChild(s);
}

function printError(msg) {
  const div = document.createElement('div');
  div.className = 'line line-error';
  div.textContent = msg;
  outputEl.appendChild(div);
  scrollToBottom();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);
  if (!cmd) return;
  if (history[0] !== raw) history.unshift(raw);
  if (history.length > 50) history.pop();
  historyIndex = -1;

  printInputLine(raw);
  printBlank();

  if (COMMANDS[cmd]) {
    try {
      const result = COMMANDS[cmd].output(args);
      if (result !== null && result !== undefined) {
        if (/<[a-z][\s\S]*>/i.test(result)) printHTML(result);
        else await printText(result, true);
      }
    } catch(e) {
      printError('Runtime error: ' + e.message);
    }
  } else {
    printError(`command not found: ${cmd}  (type 'help' to see all commands)`);
  }

  printBlank();
  scrollToBottom();
}

inputEl.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const val = inputEl.value;
    inputEl.value = '';
    await runCommand(val);
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < history.length - 1) historyIndex++;
    inputEl.value = history[historyIndex] || '';
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) historyIndex--;
    else { historyIndex = -1; inputEl.value = ''; return; }
    inputEl.value = history[historyIndex] || '';
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const val = inputEl.value.toLowerCase();
    const matches = Object.keys(COMMANDS).filter(k => k.startsWith(val));
    if (matches.length === 1) inputEl.value = matches[0];
    else if (matches.length > 1) {
      printInputLine(val);
      printHTML(`<span class="muted">${matches.join('  ')}</span>`);
    }
  }
  if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    clearOutput();
  }
});

document.querySelector('.terminal-window').addEventListener('click', () => inputEl.focus());

(async () => {
  if (CONFIG.autoRunCommand) await runCommand(CONFIG.autoRunCommand);
  inputEl.focus();
})();
</script>
</body>
</html>
