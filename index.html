<html lang="en">
<head>

<script defer src="https://cloud.umami.is/script.js" data-website-id="5da5f162-3e85-4994-8728-63fd5cddbcb3"></script>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --border:#21262d; --text:#c9d1d9;
  --dim:#768390; --prompt:#00eaff; --highlight:#58a6ff; --green:#3fb950;
  --yellow:#d29922; --red:#f85149; --pink:#f778ba; --orange:#db6d28;
  --cursor:#00eaff; --glow:rgba(0,234,255,0.15);
  --font:'JetBrains Mono','Fira Code',monospace; --fs:14px; --lh:1.8;
}
body.theme-dracula{--bg:#282a36;--surface:#1e1f29;--border:#44475a;--text:#f8f8f2;--prompt:#ff79c6;--highlight:#bd93f9;--green:#50fa7b;--cursor:#ff79c6;--glow:rgba(255,121,198,0.15);}
body.theme-matrix{--bg:#000;--surface:#0a0a0a;--border:#003b00;--text:#00ff41;--prompt:#00ff41;--highlight:#00cc33;--green:#00ff41;--cursor:#00ff41;--glow:rgba(0,255,65,0.2);}
body.theme-amber{--bg:#1a0e00;--surface:#1f1200;--border:#4a2800;--text:#ffb347;--prompt:#ffb347;--highlight:#ffd080;--green:#ffb347;--cursor:#ffb347;--glow:rgba(255,179,71,0.15);}
body.theme-nord{--bg:#2e3440;--surface:#3b4252;--border:#434c5e;--text:#eceff4;--prompt:#88c0d0;--highlight:#81a1c1;--green:#a3be8c;--cursor:#88c0d0;--glow:rgba(136,192,208,0.12);}
body.theme-cyber{--bg:#0a0010;--surface:#0f0018;--border:#2d0050;--text:#e0aaff;--prompt:#c77dff;--highlight:#e0aaff;--green:#80ffdb;--cursor:#c77dff;--glow:rgba(199,125,255,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--fs);line-height:var(--lh);overflow:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}
#boot{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;padding:40px;transition:opacity 0.6s ease;}
#boot.hide{opacity:0;pointer-events:none;}
#boot-text{color:var(--green);font-size:13px;max-width:600px;width:100%;}
#app{display:flex;align-items:center;justify-content:center;height:100vh;padding:16px;}
.terminal-window{width:100%;max-width:900px;height:92vh;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 32px 80px rgba(0,0,0,0.7),0 0 80px var(--glow);overflow:hidden;transition:box-shadow 0.3s;}
.terminal-window:focus-within{box-shadow:0 0 0 1px rgba(255,255,255,0.05),0 32px 80px rgba(0,0,0,0.7),0 0 120px var(--glow);}
.tbar{display:flex;align-items:center;gap:8px;padding:11px 16px;background:rgba(0,0,0,0.4);border-bottom:1px solid var(--border);flex-shrink:0;user-select:none;}
.dot{width:13px;height:13px;border-radius:50%;cursor:pointer;transition:opacity .2s}
.dot:hover{opacity:.7}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
.tbar-title{flex:1;text-align:center;font-size:11px;color:var(--dim);letter-spacing:.08em;}
.tbar-stats{font-size:11px;color:var(--dim);}
#sticky{padding:18px 24px 10px;flex-shrink:0;border-bottom:1px solid var(--border);}
#output{flex:1;overflow-y:auto;padding:14px 24px 6px;scroll-behavior:smooth;}
#output::-webkit-scrollbar{width:3px}
#output::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.irow{display:flex;align-items:center;padding:10px 24px 14px;border-top:1px solid var(--border);gap:0;flex-shrink:0;position:relative;}
.prompt-lbl{color:var(--prompt);white-space:nowrap;user-select:none;}
.input-wrap{flex:1;position:relative;display:flex;align-items:center;padding-left:6px;}
#userinput{position:relative;z-index:2;width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:var(--fs);caret-color:var(--prompt);}
#ghost-text{position:absolute;left:0;top:50%;transform:translateY(-50%);font-family:var(--font);font-size:var(--fs);color:var(--dim);pointer-events:none;z-index:1;white-space:pre;opacity:0.55;}
#suggestions{position:absolute;bottom:calc(100% + 4px);left:24px;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;z-index:100;display:none;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.sug-item{padding:6px 14px;cursor:pointer;color:var(--text);font-size:13px;display:flex;justify-content:space-between;gap:20px;}
.sug-item:hover,.sug-item.active{background:rgba(88,166,255,0.1);color:var(--highlight);}
.sug-desc{color:var(--dim);font-size:11px;}
.line{margin-bottom:1px;word-break:break-word;}
.line-cmd{color:var(--prompt);}
.line-out{color:var(--text);}
.line-err{color:var(--red);}
.gap{height:8px;display:block;}
.cmd-out a{color:var(--highlight);text-decoration:none;}
.cmd-out a:hover{text-decoration:underline;}
.lbl{color:var(--yellow);display:inline-block;min-width:130px;}
.acc{color:var(--prompt);}
.dim{color:var(--dim);}
.grn{color:var(--green);}
.red{color:var(--red);}
.pnk{color:var(--pink);}
.divider{border:none;border-top:1px solid var(--border);margin:8px 0;opacity:.6;}
pre.ascii{color:var(--prompt);font-size:10px;line-height:1.2;text-shadow:0 0 12px var(--prompt);}
pre.ascii-dim{color:var(--dim);font-size:10px;line-height:1.2;}
.xcard{border-left:2px solid var(--prompt);padding:8px 14px;margin:6px 0;background:rgba(0,234,255,0.03);border-radius:0 6px 6px 0;}
.xcard .xt{color:var(--prompt);font-weight:700;}
.xcard .xc{color:var(--highlight);}
.xcard .xd{color:var(--dim);font-size:12px;margin-bottom:3px;}
.xcard ul{padding-left:16px;color:var(--text);}
.xcard li{font-size:13px;margin:2px 0;}
.badge{display:inline-block;border:1px solid rgba(88,166,255,.3);background:rgba(88,166,255,.08);color:var(--highlight);border-radius:4px;padding:1px 8px;font-size:12px;margin:2px 2px 2px 0;}
.badge-g{border-color:rgba(0,234,255,.3);background:rgba(0,234,255,.06);color:var(--prompt);}
.pcard{border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin:8px 0;background:rgba(255,255,255,0.02);transition:border-color .2s,box-shadow .2s;cursor:default;}
.pcard:hover{border-color:var(--prompt);box-shadow:0 0 20px rgba(0,234,255,0.08);}
.pcard .pt{color:var(--prompt);font-weight:700;font-size:15px;}
.pcard .pd{color:var(--text);margin:5px 0;}
.pcard .pk{color:var(--dim);font-size:12px;}
.pcard .pl{margin-top:8px;}
.pcard .pl a{color:var(--highlight);font-size:12px;margin-right:14px;}
.copy-btn{display:inline-block;float:right;font-size:11px;color:var(--dim);cursor:pointer;border:1px solid var(--border);padding:1px 8px;border-radius:4px;margin-left:8px;transition:color .2s,border-color .2s;}
.copy-btn:hover{color:var(--prompt);border-color:var(--prompt);}
.prog-wrap{display:flex;align-items:center;gap:8px;margin:2px 0;}
.prog-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--prompt);border-radius:3px;box-shadow:0 0 6px var(--prompt);}
.prog-lbl{font-size:12px;color:var(--dim);min-width:30px;text-align:right;}
#matrix-canvas{position:fixed;inset:0;z-index:9998;display:none;pointer-events:none;}
@keyframes glitch1{0%,100%{clip-path:inset(0 0 98% 0);transform:translateX(-4px)}50%{clip-path:inset(0 0 98% 0);transform:translateX(4px)}}
@keyframes glitch2{0%,100%{clip-path:inset(95% 0 0 0);transform:translateX(4px)}50%{clip-path:inset(95% 0 0 0);transform:translateX(-4px)}}
@media(max-width:600px){
  :root{--fs:13px;}
  #app{padding:0;}
  .terminal-window{height:100vh;border-radius:0;border:none;}
  #sticky{padding:12px 14px 8px;}
  #output{padding:10px 14px 4px;}
  .irow{padding:8px 14px 10px;}
  pre.ascii{font-size:7px;}
}
</style>
</head>

const outEl=document.getElementById('output');

const counterEl=document.getElementById('cmd-counter');
const ghostEl=document.getElementById('ghost-text');

function updateGhost(){
  const val=inputEl.value;
  if(!val){ghostEl.textContent='';return;}
  const match=Object.keys(CMDS).find(k=>k.startsWith(val)&&k!==val);
  if(match) ghostEl.innerHTML=`<span style="color:transparent">${val}</span><span style="color:var(--text);opacity:0.35">${match.slice(val.length)}</span>`;
  else ghostEl.textContent='';
}

let hist=[],histIdx=-1,cmdCount=0,startTime=Date.now();
let matrixInterval=null,matrixCtx=null;
promptEl.textContent=CFG.prompt;

function clearOut(){outEl.innerHTML='';}
function scrollBot(){outEl.scrollTop=outEl.scrollHeight;}
function updateCursor(){}
function updatePrompt(){const path=CWD==='/home'?'':' '+CWD;promptEl.textContent=`> farhad${path}\u00a0`;}

inputEl.addEventListener('input',()=>{updateCursor();showSuggestions();updateGhost();});

function pLine(cls,html){const d=document.createElement('div');d.className='line '+cls;d.innerHTML=html;outEl.appendChild(d);}
function pHTML(html,copyable=true){
  const wrap=document.createElement('div');wrap.className='line line-out';
  if(copyable){const btn=document.createElement('span');btn.className='copy-btn';btn.textContent='copy';btn.onclick=()=>{navigator.clipboard.writeText(wrap.innerText).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='copy',1500);});};wrap.appendChild(btn);}
  const d=document.createElement('div');d.innerHTML=html;wrap.appendChild(d);outEl.appendChild(wrap);scrollBot();
}
function pGap(){const s=document.createElement('span');s.className='gap';outEl.appendChild(s);}
function pErr(msg){pLine('line-err',msg);scrollBot();}

function playClick(){
  if(!CFG.soundOn)return;
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=800+Math.random()*400;g.gain.setValueAtTime(0.05,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.04);o.start();o.stop(ctx.currentTime+0.04);}catch(e){}
}

function showSuggestions(){
  const val=inputEl.value.trim().toLowerCase();
  sugEl.style.display='none';
  if(!val||val.includes(' '))return;
  const matches=Object.entries(CMDS).filter(([k])=>k.startsWith(val)&&k!==val);
  if(!matches.length)return;
  sugEl.innerHTML=matches.slice(0,6).map(([k,v],i)=>`<div class="sug-item${i===0?' active':''}" data-cmd="${k}"><span>${k}</span><span class="sug-desc">${v.desc}</span></div>`).join('');
  sugEl.style.display='block';
  sugEl.querySelectorAll('.sug-item').forEach(el=>{el.addEventListener('mousedown',e=>{e.preventDefault();inputEl.value=el.dataset.cmd;sugEl.style.display='none';inputEl.focus();});});
}

async function runCmd(raw){
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0].toLowerCase(),args=parts.slice(1);
  if(!cmd)return;
  if(hist[0]!==raw)hist.unshift(raw);
  if(hist.length>100)hist.pop();
  histIdx=-1;cmdCount++;
  counterEl.textContent=`cmds: ${cmdCount}`;
  sugEl.style.display='none';
  pLine('line-cmd',promptEl.textContent+raw);
  pGap();playClick();
  if(CMDS[cmd]){
    try{const res=CMDS[cmd].output(args);if(res!==null&&res!==undefined){if(/<[a-z][\s\S]*>/i.test(res))pHTML(res);else pHTML(`<span>${res}</span>`);}}
    catch(e){pErr('Error: '+e.message);}
  } else {
    pErr(`Command not found: <strong>${cmd}</strong> — type <span style="color:var(--highlight)">help</span>`);
  }
  pGap();scrollBot();updatePrompt();
}

inputEl.addEventListener('keydown',async e=>{
  if(e.key==='Enter'){const v=inputEl.value;inputEl.value='';ghostEl.textContent='';sugEl.style.display='none';await runCmd(v);}
  if(e.key==='ArrowUp'){e.preventDefault();if(histIdx<hist.length-1)histIdx++;inputEl.value=hist[histIdx]||'';ghostEl.textContent='';}
  if(e.key==='ArrowDown'){e.preventDefault();if(histIdx>0)histIdx--;else{histIdx=-1;inputEl.value='';}inputEl.value=hist[histIdx]||'';ghostEl.textContent='';}
  if(e.key==='Tab'){
    e.preventDefault();
    const val=inputEl.value.toLowerCase();
    const match=Object.keys(CMDS).find(k=>k.startsWith(val)&&k!==val);
    if(match){inputEl.value=match;ghostEl.textContent='';sugEl.style.display='none';}
    else{const m=Object.keys(CMDS).filter(k=>k.startsWith(val));if(m.length>1){pLine('line-cmd',promptEl.textContent+val);pHTML(`<span class="dim">${m.join('  ')}</span>`,false);}}
  }
  if(e.key==='Escape')sugEl.style.display='none';
  if(e.key==='l'&&e.ctrlKey){e.preventDefault();clearOut();}
  playClick();
});
inputEl.addEventListener('click',updateCursor);
document.querySelector('.terminal-window').addEventListener('click',()=>inputEl.focus());
document.getElementById('btn-fullscreen').addEventListener('click',()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();});

function startMatrix(){
  const canvas=document.getElementById('matrix-canvas');canvas.style.display='block';canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  matrixCtx=canvas.getContext('2d');const cols=Math.floor(canvas.width/16);const drops=Array(cols).fill(1);
  const chars='アイウエオABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%';
  matrixInterval=setInterval(()=>{matrixCtx.fillStyle='rgba(0,0,0,0.05)';matrixCtx.fillRect(0,0,canvas.width,canvas.height);matrixCtx.fillStyle='#00ff41';matrixCtx.font='15px monospace';drops.forEach((y,i)=>{matrixCtx.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,y*16);if(y*16>canvas.height&&Math.random()>0.975)drops[i]=0;drops[i]++;});},50);
}
function stopMatrix(){clearInterval(matrixInterval);const canvas=document.getElementById('matrix-canvas');canvas.style.display='none';canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);}
