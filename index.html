<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Farhad Ali | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script defer src="https://cloud.umami.is/script.js" data-website-id="5da5f162-3e85-4994-8728-63fd5cddbcb3"></script>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --border:#21262d; --text:#c9d1d9;
  --dim:#768390; --prompt:#00eaff; --highlight:#58a6ff; --green:#3fb950;
  --yellow:#d29922; --red:#f85149; --pink:#f778ba; --orange:#db6d28;
  --cursor:#00eaff; --glow:rgba(0,234,255,0.15);
  --font:'JetBrains Mono','Fira Code',monospace; --fs:14px; --lh:1.8;
}
body.theme-dracula{--bg:#282a36;--surface:#1e1f29;--border:#44475a;--text:#f8f8f2;--prompt:#ff79c6;--highlight:#bd93f9;--green:#50fa7b;--cursor:#ff79c6;--glow:rgba(255,121,198,0.15);}
body.theme-matrix{--bg:#000;--surface:#0a0a0a;--border:#003b00;--text:#00ff41;--prompt:#00ff41;--highlight:#00cc33;--green:#00ff41;--cursor:#00ff41;--glow:rgba(0,255,65,0.2);}
body.theme-amber{--bg:#1a0e00;--surface:#1f1200;--border:#4a2800;--text:#ffb347;--prompt:#ffb347;--highlight:#ffd080;--green:#ffb347;--cursor:#ffb347;--glow:rgba(255,179,71,0.15);}
body.theme-nord{--bg:#2e3440;--surface:#3b4252;--border:#434c5e;--text:#eceff4;--prompt:#88c0d0;--highlight:#81a1c1;--green:#a3be8c;--cursor:#88c0d0;--glow:rgba(136,192,208,0.12);}
body.theme-cyber{--bg:#0a0010;--surface:#0f0018;--border:#2d0050;--text:#e0aaff;--prompt:#c77dff;--highlight:#e0aaff;--green:#80ffdb;--cursor:#c77dff;--glow:rgba(199,125,255,0.2);}
body.theme-light{--bg:#f6f8fa;--surface:#ffffff;--border:#d0d7de;--text:#24292f;--dim:#57606a;--prompt:#0969da;--highlight:#0550ae;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--pink:#bf3989;--cursor:#0969da;--glow:rgba(9,105,218,0.1);}
/* Retro — typewriter font, sepia tones */
body.theme-retro{--bg:#1a1410;--surface:#221c16;--border:#4a3728;--text:#e8d5b0;--dim:#8a7060;--prompt:#c8a96e;--highlight:#e8b86d;--green:#7ab648;--yellow:#c8a96e;--red:#c0392b;--pink:#d4906a;--cursor:#c8a96e;--glow:rgba(200,169,110,0.15);--font:'Courier New',Courier,monospace;}
body.theme-retro .terminal-window{border-radius:4px;border-width:2px;}
body.theme-retro .tbar{background:rgba(0,0,0,0.6);}
/* Bubblegum — pastel pink fun */
body.theme-bubblegum{--bg:#1a0a14;--surface:#240d1a;--border:#6b2d4a;--text:#ffd6e8;--dim:#c084a8;--prompt:#ff6eb4;--highlight:#ffb3d9;--green:#a8ff78;--yellow:#ffe066;--red:#ff6b6b;--pink:#ff6eb4;--cursor:#ff6eb4;--glow:rgba(255,110,180,0.2);--font:'JetBrains Mono',monospace;}
body.theme-bubblegum .terminal-window{border-radius:20px;}
body.theme-bubblegum .tbar{background:rgba(255,110,180,0.1);}
/* Ocean — deep sea blues */
body.theme-ocean{--bg:#020b18;--surface:#041525;--border:#0a3050;--text:#cce7ff;--dim:#4a7fa0;--prompt:#00b4d8;--highlight:#90e0ef;--green:#52b788;--yellow:#f4a261;--red:#e63946;--pink:#c77dff;--cursor:#00b4d8;--glow:rgba(0,180,216,0.2);--font:'JetBrains Mono',monospace;}
body.theme-ocean .terminal-window{border-radius:16px;}
/* Latte — cozy coffee shop */
body.theme-latte{--bg:#f4ede3;--surface:#fdf8f2;--border:#d4b896;--text:#3d2b1f;--dim:#8b6b4f;--prompt:#8b4513;--highlight:#a0522d;--green:#4a7c59;--yellow:#b8860b;--red:#8b2020;--pink:#c2507a;--cursor:#8b4513;--glow:rgba(139,69,19,0.1);--font:'Georgia',serif;}
body.theme-latte .terminal-window{border-radius:8px;border-width:2px;}
body.theme-latte .tbar{background:rgba(139,69,19,0.08);}
/* Glitch — chaotic neon distortion */
body.theme-glitch{--bg:#050005;--surface:#0a000a;--border:#ff003c;--text:#00ffff;--dim:#008080;--prompt:#ff003c;--highlight:#00ffff;--green:#00ff9f;--yellow:#ffff00;--red:#ff003c;--pink:#ff00ff;--cursor:#ff003c;--glow:rgba(255,0,60,0.3);--font:'JetBrains Mono',monospace;}
body.theme-glitch .terminal-window{border-radius:0px;border-width:2px;border-color:#ff003c;}
body.theme-glitch .tbar{background:rgba(255,0,60,0.1);}
body.theme-glitch .prompt-lbl{text-shadow:2px 0 #ff00ff,-2px 0 #00ffff;}
@keyframes popIn{0%{opacity:0;transform:scale(0.8) translateY(-10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--fs);line-height:var(--lh);overflow:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}
#boot{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;padding:40px;transition:opacity 0.6s ease;}
#boot.hide{opacity:0;pointer-events:none;}
#boot-text{color:var(--green);font-size:13px;max-width:600px;width:100%;}
#app{display:flex;align-items:center;justify-content:center;height:100vh;padding:16px;}
.terminal-window{width:100%;max-width:900px;height:92vh;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 32px 80px rgba(0,0,0,0.7),0 0 80px var(--glow);overflow:hidden;transition:box-shadow 0.3s;}
.terminal-window:focus-within{box-shadow:0 0 0 1px rgba(255,255,255,0.05),0 32px 80px rgba(0,0,0,0.7),0 0 120px var(--glow);}
.tbar{display:flex;align-items:center;gap:8px;padding:11px 16px;background:rgba(0,0,0,0.4);border-bottom:1px solid var(--border);flex-shrink:0;user-select:none;}
.dot{width:13px;height:13px;border-radius:50%;cursor:pointer;transition:opacity .2s}
.dot:hover{opacity:.7}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
.tbar-title{flex:1;text-align:center;font-size:11px;color:var(--dim);letter-spacing:.08em;}
.tbar-stats{font-size:11px;color:var(--dim);}
#sticky{padding:18px 24px 10px;flex-shrink:0;border-bottom:1px solid var(--border);}
#output{flex:1;overflow-y:auto;padding:14px 24px 6px;scroll-behavior:smooth;}
#output::-webkit-scrollbar{width:3px}
#output::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.irow{display:flex;align-items:center;padding:10px 24px 14px;border-top:1px solid var(--border);gap:0;flex-shrink:0;position:relative;}
.prompt-lbl{color:var(--prompt);white-space:nowrap;user-select:none;}
.input-wrap{flex:1;position:relative;display:flex;align-items:center;padding-left:6px;}
#userinput{position:relative;z-index:2;width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:var(--fs);caret-color:var(--prompt);}
#ghost-text{position:absolute;left:0;top:50%;transform:translateY(-50%);font-family:var(--font);font-size:var(--fs);color:var(--dim);pointer-events:none;z-index:1;white-space:pre;opacity:0.55;}
#suggestions{position:absolute;bottom:calc(100% + 4px);left:24px;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;z-index:100;display:none;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.sug-item{padding:6px 14px;cursor:pointer;color:var(--text);font-size:13px;display:flex;justify-content:space-between;gap:20px;}
.sug-item:hover,.sug-item.active{background:rgba(88,166,255,0.1);color:var(--highlight);}
.sug-desc{color:var(--dim);font-size:11px;}
.line{margin-bottom:1px;word-break:break-word;}
.line-cmd{color:var(--prompt);}
.line-out{color:var(--text);}
.line-err{color:var(--red);}
.gap{height:8px;display:block;}
.cmd-out a{color:var(--highlight);text-decoration:none;}
.cmd-out a:hover{text-decoration:underline;}
.lbl{color:var(--yellow);display:inline-block;min-width:130px;}
.acc{color:var(--prompt);}
.dim{color:var(--dim);}
.grn{color:var(--green);}
.red{color:var(--red);}
.pnk{color:var(--pink);}
.divider{border:none;border-top:1px solid var(--border);margin:8px 0;opacity:.6;}
pre.ascii{color:var(--prompt);font-size:10px;line-height:1.2;text-shadow:0 0 12px var(--prompt);}
pre.ascii-dim{color:var(--dim);font-size:10px;line-height:1.2;}
.xcard{border-left:2px solid var(--prompt);padding:8px 14px;margin:6px 0;background:rgba(0,234,255,0.03);border-radius:0 6px 6px 0;}
.xcard .xt{color:var(--prompt);font-weight:700;}
.xcard .xc{color:var(--highlight);}
.xcard .xd{color:var(--dim);font-size:12px;margin-bottom:3px;}
.xcard ul{padding-left:16px;color:var(--text);}
.xcard li{font-size:13px;margin:2px 0;}
.badge{display:inline-block;border:1px solid rgba(88,166,255,.3);background:rgba(88,166,255,.08);color:var(--highlight);border-radius:4px;padding:1px 8px;font-size:12px;margin:2px 2px 2px 0;}
.badge-g{border-color:rgba(0,234,255,.3);background:rgba(0,234,255,.06);color:var(--prompt);}
.pcard{border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin:8px 0;background:rgba(255,255,255,0.02);transition:border-color .2s,box-shadow .2s;cursor:default;}
.pcard:hover{border-color:var(--prompt);box-shadow:0 0 20px rgba(0,234,255,0.08);}
.pcard .pt{color:var(--prompt);font-weight:700;font-size:15px;}
.pcard .pd{color:var(--text);margin:5px 0;}
.pcard .pk{color:var(--dim);font-size:12px;}
.pcard .pl{margin-top:8px;}
.pcard .pl a{color:var(--highlight);font-size:12px;margin-right:14px;}
.copy-btn{display:inline-block;float:right;font-size:11px;color:var(--dim);cursor:pointer;border:1px solid var(--border);padding:1px 8px;border-radius:4px;margin-left:8px;transition:color .2s,border-color .2s;}
.copy-btn:hover{color:var(--prompt);border-color:var(--prompt);}
.prog-wrap{display:flex;align-items:center;gap:8px;margin:2px 0;}
.prog-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--prompt);border-radius:3px;box-shadow:0 0 6px var(--prompt);}
.prog-lbl{font-size:12px;color:var(--dim);min-width:30px;text-align:right;}
.gcard{position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s;}
.gcard:hover{border-color:var(--prompt);box-shadow:0 0 20px rgba(0,234,255,0.1);}
.goverlay{position:absolute;inset:0;background:rgba(0,0,0,0.78);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:10px;text-align:center;}
.gcard:hover .goverlay{opacity:1;}
#matrix-canvas{position:fixed;inset:0;z-index:9998;display:none;pointer-events:none;}
@media(max-width:600px){
  :root{--fs:13px;}
  #app{padding:0;}
  .terminal-window{height:100vh;border-radius:0;border:none;}
  #sticky{padding:12px 14px 8px;}
  #output{padding:10px 14px 4px;}
  .irow{padding:8px 14px 10px;}
  pre.ascii{font-size:7px;}
}
</style>
</head>
<body>
<div id="boot"><div id="boot-text"></div></div>
<canvas id="matrix-canvas"></canvas>
<div id="app">
  <div class="terminal-window" id="termwin">
    <div class="tbar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g" id="btn-fullscreen"></div>
      <span class="tbar-title">farhad.sh</span>
      <span id="snd-btn" title="Toggle sound" style="cursor:pointer;font-size:13px;color:var(--dim);padding:2px 8px;border:1px solid var(--border);border-radius:4px;user-select:none;transition:color .2s,border-color .2s;" onclick="toggleSound()">🔇</span>
      <span class="tbar-stats" id="live-clock"></span>
    </div>
    <div id="sticky"></div>
    <div id="output"></div>
    <div id="suggestions"></div>
    <div class="irow">
      <span class="prompt-lbl" id="promptlbl">&gt; farhad&nbsp;</span>
      <div class="input-wrap">
        <span id="ghost-text"></span>
        <input id="userinput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text"/>
      </div>
    </div>
  </div>
</div>
<script>
const CFG = { prompt:'> farhad\u00a0', typeSpeed:18, bootSpeed:22, soundOn:false, soundProfile:'typewriter' };

let CONTENT = {
  name:"Farhad Ali", title:"Manufacturing Associate & Aspiring Data Analyst",
  location:"Lodi, California", company:"Cepheid", college:"Delta College", gpa:"3.8",
  email:"farhad622860@gmail.com", github:"https://github.com/starwirelane",
  linkedin:"https://www.linkedin.com/in/FarhadAIi",
  buymeacoffee:"https://buymeacoffee.com/farhadaii",
  bio:"Manufacturing Associate at Cepheid and student at San Joaquin Delta College.",
  whoami:"Manufacturing Associate at Cepheid and student at San Joaquin Delta College. Interested in business analytics, data analysis, and operational improvement.",
  currently:"Currently working as a Manufacturing Associate at Cepheid while studying at San Joaquin Delta College.",
  mission:"My goal is to apply analytical thinking and data analysis to improve operational efficiency.",
  status:"Currently building analytics skills and preparing for opportunities in business analytics.",
  open_to_work:true,
  experience:[], education:[], awards:[], projects:[],
  photography:[], trails:[],
  skills_manufacturing:[], skills_analytics:[], skills_leadership:[], skill_levels:[]
};

async function loadContent(){
  try{
    const res=await fetch('/content.json?t='+Date.now());
    if(res.ok){
      const data=await res.json();
      Object.assign(CONTENT,data);
    }
  }catch(e){}
}

const FS={
  '/':['home','projects','resume.pdf','readme.txt'],
  '/home':['about.txt','skills.txt','contact.txt'],
  '/projects':['genexpert','dashboard','terminal'],
};
let CWD='/home';
function fsLs(path){ const p=path||CWD; return FS[p]||null; }
function fsCd(arg){
  if(!arg||arg==='~'){CWD='/home';return null;}
  if(arg==='..'){const parts=CWD.split('/').filter(Boolean);parts.pop();CWD='/'+parts.join('/');if(CWD==='/')CWD='/';return null;}
  const next=CWD==='/'?'/'+arg:CWD+'/'+arg;
  if(FS[next]!==undefined){CWD=next;return null;}
  return `cd: no such directory: ${arg}`;
}
const FILE_CONTENT={
  'readme.txt':'<span class="acc">README — Farhad Ali Portfolio</span>\nWelcome! Type <span class="badge">help</span> to see all commands.',
  'about.txt':'<span class="acc">Farhad Ali</span> — Manufacturing Associate & Aspiring Data Analyst\nLocation: Lodi, California\nGPA: 3.8 — High Honors',
  'skills.txt':'<span class="acc">Core Skills</span>\nGMP · ISO · GeneXpert · Cleanroom Ops · IPT\nData Recording · Business Analytics · Documentation',
  'contact.txt':'<span class="acc">Contact</span>\nEmail: farhad622860@gmail.com\nLinkedIn: linkedin.com/in/farhadali-627770352',
};

const CMDS = {
  help:{
    desc:'Show all commands',
    output:()=>{
      const groups={
        'Core':['help','about','whoami','currently','mission','status'],
        'Portfolio':['projects','experience','skills','education','awards','resume'],
        'Links':['github','linkedin','contact'],
        'Interests':['photography','hiking'],
        'Terminal':['theme','clear','fullscreen','sound'],
        'Fun':['matrix','hack','coffee','joke'],
        'System':['location','system','date'],
      };
      let out=`<div class="cmd-out"><div style="margin-bottom:10px"><span class="acc">Available Commands</span> <span class="dim">— type any command below</span></div>`;
      for(const [g,cmds] of Object.entries(groups)){
        out+=`<div style="margin:8px 0 4px"><span class="dim" style="text-transform:uppercase;letter-spacing:0.08em;font-size:11px">${g}</span></div>`;
        out+=cmds.map(c=>CMDS[c]?`<div><span class="lbl" style="min-width:120px;color:var(--highlight)">${c}</span><span class="dim">${CMDS[c].desc}</span></div>`:'').join('');
      }
      out+=`<hr class="divider"><span class="dim">Tip: </span><span class="badge">Tab</span><span class="dim"> autocomplete &nbsp;·&nbsp; </span><span class="badge">↑↓</span><span class="dim"> history &nbsp;·&nbsp; </span><span class="badge">Ctrl+L</span><span class="dim"> clear</span></div>`;
      return out;
    }
  },

  about:{
    desc:'About Farhad Ali',
    output:()=>`<div class="cmd-out">
<span class="acc" style="font-size:16px;font-weight:700">Farhad Ali</span>
<hr class="divider">
<span class="dim">Manufacturing Associate at Cepheid and student at San Joaquin Delta College. I am passionate about using data and analytical thinking to solve real world problems and improve how organizations operate. My experience in manufacturing and operations has given me hands on exposure to processes, performance metrics, and operational efficiency.</span>
</div>`
  },

  whoami:{
    desc:'Who is Farhad Ali',
    output:()=>`<div class="cmd-out">
<span class="acc" style="font-size:16px;font-weight:700">${CONTENT.name}</span>
<hr class="divider">
<span class="dim">${CONTENT.whoami||CONTENT.bio}</span>
</div>`
  },

  currently:{
    desc:'What I am currently working on',
    output:()=>`<div class="cmd-out">
<span class="acc">Currently</span>
<hr class="divider">
<span class="dim">${CONTENT.currently||CONTENT.bio}</span>
</div>`
  },

  mission:{
    desc:'My goal and direction',
    output:()=>`<div class="cmd-out">
<span class="acc">Mission</span>
<hr class="divider">
<span class="dim">${CONTENT.mission||'My goal is to apply analytical thinking and data analysis to improve operational efficiency.'}</span>
</div>`
  },

  status:{
    desc:'Current focus',
    output:()=>`<div class="cmd-out">
<span class="acc">Status</span>
<hr class="divider">
<span class="grn">● Active</span> <span class="dim">— ${CONTENT.status||'Currently open to new opportunities.'}</span>
${CONTENT.open_to_work?'<br><span class="grn">✓ Open to new opportunities</span>':''}
</div>`
  },

  projects:{
    desc:'View my projects',
    output:()=>{
      const projects=CONTENT.projects||[];
      const cards=projects.map(p=>`<div class="pcard">
  <div class="pt">${p.emoji||'💻'} ${p.title}</div>
  <div class="pd">${p.desc}</div>
  <div class="pk">${p.tags}</div>
  <div class="pl"><a href="${p.link}" target="_blank">[ GitHub ]</a></div>
</div>`).join('');
      return `<div class="cmd-out"><span class="acc">Projects</span><hr class="divider">${cards}</div>`;
    }
  },

  experience:{
    desc:'Work experience',
    output:()=>{
      const exp=CONTENT.experience||[];
      if(!exp.length) return `<div class="cmd-out"><span class="acc">Work Experience</span><hr class="divider"><span class="dim">No experience listed yet.</span></div>`;
      const cards=exp.map(e=>`<div class="xcard">
  <div class="xt">${e.title}</div>
  <div class="xc">${e.company}</div>
  <div class="xd">${e.dates||e.period||''} · ${e.location||''}</div>
  <ul>${(e.bullets||[]).map(b=>`<li>${b.item||b}</li>`).join('')}</ul>
</div>`).join('');
      return `<div class="cmd-out"><span class="acc">Work Experience</span><hr class="divider">${cards}</div>`;
    }
  },

  skills:{
    desc:'Skills and competencies',
    output:()=>{
      const mfg=CONTENT.skills_manufacturing||[];
      const ana=CONTENT.skills_analytics||[];
      const lead=CONTENT.skills_leadership||[];
      const levels=(CONTENT.skill_levels||[]).map(l=>`<div class="prog-wrap"><span style="min-width:150px;font-size:13px">${l.name}</span><div class="prog-bar"><div class="prog-fill" style="width:${l.value}%"></div></div><span class="prog-lbl">${l.value}%</span></div>`).join('');
      return `<div class="cmd-out">
<span class="acc">Skills &amp; Competencies</span><hr class="divider">
<div style="margin:6px 0 2px"><span class="dim">Manufacturing &amp; Quality</span></div>
${mfg.map(x=>`<span class="badge badge-g">${x.item||x}</span>`).join('')}
<div style="margin:10px 0 2px"><span class="dim">Analytics &amp; Data</span></div>
${ana.map(x=>`<span class="badge">${x.item||x}</span>`).join('')}
<div style="margin:10px 0 2px"><span class="dim">Leadership</span></div>
${lead.map(x=>`<span class="badge">${x.item||x}</span>`).join('')}
<hr class="divider"><div style="margin-bottom:4px"><span class="dim">Skill levels</span></div>
${levels}</div>`;
    }
  },

  education:{
    desc:'Education background',
    output:()=>{
      const edu=CONTENT.education||[];
      if(!edu.length) return `<div class="cmd-out"><span class="acc">Education</span><hr class="divider"><span class="dim">No education listed yet.</span></div>`;
      const cards=edu.map(e=>`<div class="xcard">
  <div class="xt">${e.degree}</div>
  <div class="xc">${e.school}</div>
  <div class="xd">${e.dates||e.period||''} · ${e.location||''}</div>
  <ul><li>${e.notes||''}</li><li><span class="grn">GPA: ${e.gpa||''}</span></li></ul>
</div>`).join('');
      return `<div class="cmd-out"><span class="acc">Education</span><hr class="divider">${cards}</div>`;
    }
  },

  awards:{
    desc:'Honors and awards',
    output:()=>{
      const awards=CONTENT.awards||[];

function updateSndBtn(){
  const btn=document.getElementById('snd-btn');
  if(!btn)return;
  btn.textContent=CFG.soundOn?'🔊':'🔇';
  btn.style.color=CFG.soundOn?'var(--prompt)':'var(--dim)';
  btn.style.borderColor=CFG.soundOn?'var(--prompt)':'var(--border)';
}
function toggleSound(){
  CFG.soundOn=!CFG.soundOn;
  updateSndBtn();
  if(CFG.soundOn) playClick();
}
function playClick(){
  if(!CFG.soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    const p=CFG.soundProfile;
    if(p==='mechanical'){
      o.type='square';o.frequency.value=1200+Math.random()*200;
      g.gain.setValueAtTime(0.06,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);
      o.start();o.stop(ctx.currentTime+0.05);
    } else if(p==='typewriter'){
      o.type='sawtooth';o.frequency.value=600+Math.random()*100;
      g.gain.setValueAtTime(0.04,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      o.start();o.stop(ctx.currentTime+0.08);
    } else if(p==='scifi'){
      o.type='sine';o.frequency.setValueAtTime(800,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1600,ctx.currentTime+0.1);
      g.gain.setValueAtTime(0.05,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
      o.start();o.stop(ctx.currentTime+0.12);
    } else if(p==='digital'){
      o.type='square';o.frequency.value=440;
      g.gain.setValueAtTime(0.04,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.04);
      o.start();o.stop(ctx.currentTime+0.04);
    } else if(p==='tap'){
      o.type='sine';o.frequency.value=900;
      g.gain.setValueAtTime(0.03,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.03);
      o.start();o.stop(ctx.currentTime+0.03);
    } else if(p==='chime'){
      o.type='sine';o.frequency.value=1046;
      g.gain.setValueAtTime(0.06,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(p==='ping'){
      o.type='sine';o.frequency.setValueAtTime(1200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(800,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.05,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      o.start();o.stop(ctx.currentTime+0.2);
    } else {
      o.frequency.value=800+Math.random()*400;
      g.gain.setValueAtTime(0.05,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.04);
      o.start();o.stop(ctx.currentTime+0.04);
    }
  }catch(e){}
}

function showSuggestions(){
  const val=inputEl.value.trim().toLowerCase();
  sugEl.style.display='none';
  if(!val||val.includes(' '))return;
  const matches=Object.entries(CMDS).filter(([k])=>k.startsWith(val)&&k!==val);
  if(!matches.length)return;
  sugEl.innerHTML=matches.slice(0,6).map(([k,v],i)=>`<div class="sug-item${i===0?' active':''}" data-cmd="${k}"><span>${k}</span><span class="sug-desc">${v.desc}</span></div>`).join('');
  sugEl.style.display='block';
  sugEl.querySelectorAll('.sug-item').forEach(el=>{el.addEventListener('mousedown',e=>{e.preventDefault();inputEl.value=el.dataset.cmd;sugEl.style.display='none';inputEl.focus();});});
}

async function runCmd(raw){
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0].toLowerCase(),args=parts.slice(1);
  if(!cmd)return;
  if(hist[0]!==raw)hist.unshift(raw);
  if(hist.length>100)hist.pop();
  histIdx=-1;cmdCount++;
  sugEl.style.display='none';
  pLine('line-cmd',promptEl.textContent+raw);
  pGap();playClick();
  if(CMDS[cmd]){
    try{const res=CMDS[cmd].output(args);if(res!==null&&res!==undefined){if(/<[a-z][\s\S]*>/i.test(res))pHTML(res);else pHTML(`<span>${res}</span>`);}}
    catch(e){pErr('Error: '+e.message);}
  } else {
    pErr(`Command not found: <strong>${cmd}</strong> — type <span style="color:var(--highlight)">help</span>`);
  }
  pGap();scrollBot();updatePrompt();
}

inputEl.addEventListener('keydown',async e=>{
  if(e.key==='Enter'){const v=inputEl.value;inputEl.value='';ghostEl.textContent='';sugEl.style.display='none';await runCmd(v);}
  if(e.key==='ArrowUp'){e.preventDefault();if(histIdx<hist.length-1)histIdx++;inputEl.value=hist[histIdx]||'';ghostEl.textContent='';}
  if(e.key==='ArrowDown'){e.preventDefault();if(histIdx>0)histIdx--;else{histIdx=-1;inputEl.value='';}inputEl.value=hist[histIdx]||'';ghostEl.textContent='';}
  if(e.key==='Tab'){
    e.preventDefault();
    const val=inputEl.value.toLowerCase();
    const match=Object.keys(CMDS).find(k=>k.startsWith(val)&&k!==val);
    if(match){inputEl.value=match;ghostEl.textContent='';sugEl.style.display='none';}
    else{const m=Object.keys(CMDS).filter(k=>k.startsWith(val));if(m.length>1){pLine('line-cmd',promptEl.textContent+val);pHTML(`<span class="dim">${m.join('  ')}</span>`,false);}}
  }
  if(e.key==='Escape')sugEl.style.display='none';
  if(e.key==='l'&&e.ctrlKey){e.preventDefault();clearOut();}
  playClick();
});
inputEl.addEventListener('click',updateCursor);
document.querySelector('.terminal-window').addEventListener('click',()=>inputEl.focus());
document.getElementById('btn-fullscreen').addEventListener('click',()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();});

function startMatrix(){
  const canvas=document.getElementById('matrix-canvas');canvas.style.display='block';canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  matrixCtx=canvas.getContext('2d');const cols=Math.floor(canvas.width/16);const drops=Array(cols).fill(1);
  const chars='アイウエオABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%';
  matrixInterval=setInterval(()=>{matrixCtx.fillStyle='rgba(0,0,0,0.05)';matrixCtx.fillRect(0,0,canvas.width,canvas.height);matrixCtx.fillStyle='#00ff41';matrixCtx.font='15px monospace';drops.forEach((y,i)=>{matrixCtx.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,y*16);if(y*16>canvas.height&&Math.random()>0.975)drops[i]=0;drops[i]++;});},50);
}
function stopMatrix(){clearInterval(matrixInterval);const canvas=document.getElementById('matrix-canvas');canvas.style.display='none';canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);}
